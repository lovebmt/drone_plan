<svg width="2400" height="1800" viewBox="0 0 2400 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-200" y="-200" width="2800" height="2200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#29598D" flood-opacity="0.16"/>
    </filter>
    <radialGradient id="clusterGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(965 725) rotate(90) scale(260 320)">
      <stop offset="0" stop-color="#1F7AFF" stop-opacity="0.28"/>
      <stop offset="0.62" stop-color="#59C6F2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#59C6F2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="landRoute" x1="455" y1="554" x2="963" y2="725" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13A47A"/>
      <stop offset="1" stop-color="#1FB8A6"/>
    </linearGradient>
    <linearGradient id="seaRoute" x1="730" y1="1267" x2="980" y2="1697" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFBE3B"/>
      <stop offset="1" stop-color="#F08A00"/>
    </linearGradient>
    <linearGradient id="airRoute" x1="1005" y1="718" x2="2150" y2="505" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A66FF"/>
      <stop offset="1" stop-color="#4B55F5"/>
    </linearGradient>
  </defs>

  <image href="/images/osm-asean-wide-clean.png" x="0" y="0" width="2400" height="1800" preserveAspectRatio="none"/>
  <rect x="0" y="0" width="2400" height="1800" fill="#F8FBFF" fill-opacity="0.05"/>

  <ellipse cx="965" cy="725" rx="250" ry="190" fill="url(#clusterGlow)"/>
  <ellipse cx="729" cy="1267" rx="120" ry="84" fill="#FFBE3B" fill-opacity="0.12"/>
  <ellipse cx="2150" cy="505" rx="120" ry="88" fill="#7A66FF" fill-opacity="0.10"/>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M963 725C915 702 862 690 822 683" stroke="url(#landRoute)" stroke-width="10" stroke-dasharray="20 18"/>
    <path d="M822 683C710 618 579 575 455 554" stroke="url(#landRoute)" stroke-width="10" stroke-dasharray="20 18"/>

    <path d="M963 725C900 890 816 1080 730 1267" stroke="#FFBE3B" stroke-width="10" stroke-dasharray="20 18"/>
    <path d="M730 1267C804 1456 888 1603 980 1697" stroke="url(#seaRoute)" stroke-width="10" stroke-dasharray="20 18"/>
    <path d="M730 1267C677 1220 620 1187 553 1165" stroke="url(#seaRoute)" stroke-width="10" stroke-dasharray="20 18"/>

    <path d="M1005 718C1318 540 1728 470 2150 505" stroke="url(#airRoute)" stroke-width="10" stroke-dasharray="20 18"/>
    <path d="M1005 718C914 540 804 388 632 305" stroke="url(#airRoute)" stroke-width="10" stroke-dasharray="20 18"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="78" width="712" height="290" rx="34" fill="#FFFFFF" fill-opacity="0.93"/>
    <text x="130" y="142" fill="#1F7AFF" font-family="Space Grotesk, sans-serif" font-size="30" font-weight="700">ASEAN ACCESS MODEL</text>
    <text x="130" y="204" fill="#11375D" font-family="Space Grotesk, sans-serif" font-size="46" font-weight="700">Southern Vietnam as the operating hub</text>
    <text x="130" y="258" fill="#5C6D83" font-family="Manrope, sans-serif" font-size="28">Land freight to Cambodia and Thailand, sea links to Singapore and Indonesia,</text>
    <text x="130" y="298" fill="#5C6D83" font-family="Manrope, sans-serif" font-size="28">and air reach into major ASEAN capitals from the HCMC cluster.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1640" y="78" width="672" height="314" rx="34" fill="#FFFFFF" fill-opacity="0.93"/>
    <text x="1688" y="142" fill="#11375D" font-family="Space Grotesk, sans-serif" font-size="40" font-weight="700">Three simple corridors</text>

    <line x1="1690" y1="204" x2="1810" y2="204" stroke="url(#landRoute)" stroke-width="10" stroke-linecap="round" stroke-dasharray="20 18"/>
    <text x="1844" y="214" fill="#11375D" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Land corridor</text>
    <text x="1844" y="250" fill="#5C6D83" font-family="Manrope, sans-serif" font-size="27">Phnom Penh to Bangkok by road</text>

    <line x1="1690" y1="288" x2="1810" y2="288" stroke="url(#seaRoute)" stroke-width="10" stroke-linecap="round" stroke-dasharray="20 18"/>
    <text x="1844" y="298" fill="#11375D" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Sea route</text>
    <text x="1844" y="334" fill="#5C6D83" font-family="Manrope, sans-serif" font-size="27">Singapore hub with Malaysia and Indonesia links</text>

    <line x1="1690" y1="372" x2="1810" y2="372" stroke="url(#airRoute)" stroke-width="10" stroke-linecap="round" stroke-dasharray="20 18"/>
    <text x="1844" y="382" fill="#11375D" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Air reach</text>
    <text x="1844" y="418" fill="#5C6D83" font-family="Manrope, sans-serif" font-size="27">Regional capitals within fast deployment range</text>
  </g>

  <g>
    <circle cx="963" cy="725" r="26" fill="#1F7AFF" stroke="#FFFFFF" stroke-width="10"/>
    <circle cx="1005" cy="718" r="22" fill="#7A66FF" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="822" cy="683" r="20" fill="#1FB8A6" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="455" cy="554" r="20" fill="#1FB8A6" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="553" cy="1165" r="20" fill="#F08A00" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="730" cy="1267" r="20" fill="#F08A00" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="980" cy="1697" r="20" fill="#F08A00" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="2150" cy="505" r="20" fill="#4B55F5" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="632" cy="305" r="20" fill="#4B55F5" stroke="#FFFFFF" stroke-width="8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="742" width="520" height="120" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="1130" y="798" fill="#1F7AFF" font-family="Space Grotesk, sans-serif" font-size="31" font-weight="700">SOUTHERN VIETNAM CLUSTER</text>
    <text x="1130" y="846" fill="#11375D" font-family="Manrope, sans-serif" font-size="33" font-weight="800">HCMC, Binh Duong, Long An, Long Thanh</text>

    <rect x="734" y="580" width="250" height="82" rx="20" fill="#E5F6F2" fill-opacity="0.96"/>
    <text x="766" y="632" fill="#0D7B78" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Phnom Penh</text>

    <rect x="170" y="460" width="228" height="82" rx="20" fill="#E5F6F2" fill-opacity="0.96"/>
    <text x="204" y="512" fill="#0D7B78" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Bangkok</text>

    <rect x="594" y="1288" width="228" height="82" rx="20" fill="#FFF0D3" fill-opacity="0.97"/>
    <text x="630" y="1340" fill="#A66800" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Singapore</text>

    <rect x="998" y="1574" width="216" height="82" rx="20" fill="#FFF0D3" fill-opacity="0.97"/>
    <text x="1034" y="1626" fill="#A66800" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Jakarta</text>

    <rect x="1918" y="400" width="214" height="82" rx="20" fill="#ECE9FF" fill-opacity="0.97"/>
    <text x="1950" y="452" fill="#5140D3" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Manila</text>

    <rect x="352" y="196" width="214" height="82" rx="20" fill="#ECE9FF" fill-opacity="0.97"/>
    <text x="386" y="248" fill="#5140D3" font-family="Manrope, sans-serif" font-size="30" font-weight="800">Vientiane</text>

    <rect x="332" y="1060" width="246" height="76" rx="18" fill="#FFF0D3" fill-opacity="0.97"/>
    <text x="364" y="1109" fill="#A66800" font-family="Manrope, sans-serif" font-size="28" font-weight="800">Kuala Lumpur</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="1512" width="770" height="170" rx="30" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="130" y="1582" fill="#1F7AFF" font-family="Space Grotesk, sans-serif" font-size="30" font-weight="700">WHY IT IS EASY TO READ</text>
    <text x="130" y="1632" fill="#11375D" font-family="Manrope, sans-serif" font-size="31" font-weight="800">One hub in Southern Vietnam, three outbound lanes, clear ASEAN reach.</text>
  </g>
</svg>
